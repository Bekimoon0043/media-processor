    <section>
        <h2>4. Merge Video with Translated Audio (Aligned by Sentences)</h2>
        <form id="mergeTranslatedForm" enctype="multipart/form-data">
            <label>Original Video:</label>
            <input type="file" name="video" accept="video/*" required><br>

            <label>Sentences JSON (from transcription step):</label>
            <input type="file" name="sentences_json" accept=".json,application/json" required><br>

            <label>Translated Audio Files (one per sentence, in same order):</label>
            <input type="file" name="audio_files" multiple accept="audio/*" required><br>

            <label>Volume multiplier (e.g., 1.0 = original, 2.0 = double):</label>
            <input type="number" name="volume" step="0.1" value="1.0" required><br>

            <button type="submit" id="mergeTranslatedButton">Merge Translated</button>
        </form>
        <div id="mergeTranslatedLoading" class="loading" style="display: none;">⏳ Processing... This may take a moment.</div>
        <div id="mergeTranslatedError" class="error" style="display: none;"></div>
    </section>

    <script>
        // Existing script for transcribeForm remains unchanged.
        // Add new handler for mergeTranslatedForm
        const mergeTranslatedForm = document.getElementById('mergeTranslatedForm');
        const mergeTranslatedButton = document.getElementById('mergeTranslatedButton');
        const mergeTranslatedLoading = document.getElementById('mergeTranslatedLoading');
        const mergeTranslatedError = document.getElementById('mergeTranslatedError');

        mergeTranslatedForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            mergeTranslatedError.style.display = 'none';
            mergeTranslatedError.innerText = '';
            mergeTranslatedLoading.style.display = 'block';
            mergeTranslatedButton.disabled = true;

            const formData = new FormData(mergeTranslatedForm);

            try {
                const response = await fetch('/merge-translated', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    let errorMsg = `HTTP error ${response.status}`;
                    try {
                        const errData = await response.json();
                        errorMsg = errData.error || errorMsg;
                    } catch {
                        errorMsg = response.statusText || errorMsg;
                    }
                    throw new Error(errorMsg);
                }

                // If successful, server returns the merged video file.
                // Create a download link.
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'translated_merged.mp4';
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                mergeTranslatedError.innerText = `Error: ${error.message}`;
                mergeTranslatedError.style.display = 'block';
            } finally {
                mergeTranslatedLoading.style.display = 'none';
                mergeTranslatedButton.disabled = false;
            }
        });
    </script>
