<!DOCTYPE html>
<html>
<head>
    <title>Custom Caption Overlay</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
        form { border: 1px solid #ccc; padding: 20px; border-radius: 5px; }
        input[type=file], input[type=text] { margin: 10px 0; padding: 8px; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🎬 Add Custom Caption to Video</h1>
    <form action="/process" method="post" enctype="multipart/form-data">
        <label>Choose a video file:</label>
        <input type="file" name="file" accept="video/*" required>

        <label>Enter caption text:</label>
        <input type="text" name="caption" placeholder="e.g., Amharic Video" required>

        <button type="submit">Upload and Add Caption</button>
    </form>
    <p><small>The caption will appear centered, in yellow with a black outline and a semi-transparent background.</small></p>
    <p><small>Health check: <a href="/health">/health</a></small></p>
</body>
</html>
