<!DOCTYPE html>
<html>
<head>
    <title>Amharic Video Processor</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: auto; padding: 20px; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input, select, button { margin: 5px 0; padding: 8px; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <h1>🎬 Amharic Video Processor</h1>

    <div class="section">
        <h2>Add "Amharic Video" Title Overlay</h2>
        <form action="/process" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="video/*" required>
            <button type="submit">Upload and Add Title</button>
        </form>
    </div>

    <div class="section">
        <h2>Generate Amharic Subtitles (SRT)</h2>
        <form action="/transcribe" method="post" enctype="multipart/form-data">
            <input type="file" name="file" accept="audio/*,video/*" required>
            <label>Language:</label>
            <select name="language">
                <option value="am">Amharic</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
            </select>
            <label>Task:</label>
            <select name="task">
                <option value="transcribe">Transcribe (keep original language)</option>
                <option value="translate">Translate to English</option>
            </select>
            <button type="submit">Generate Subtitles</button>
        </form>
        <p><small>For Amharic, select "Amharic" and "Transcribe". The model may take a few seconds to load on first request.</small></p>
    </div>

    <p><strong>Health:</strong> <a href="/health">/health</a></p>
</body>
</html>
