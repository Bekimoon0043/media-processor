<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Media Toolbox</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; }
        section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        input, button { margin-top: 5px; }
        .result { margin-top: 10px; background: #f0f0f0; padding: 10px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>🎬 Media Toolbox</h1>
    <p>Upload files and perform operations. For n8n, use the same endpoints with form-data.</p>

    <section>
        <h2>1. Separate Audio from Video</h2>
        <form action="/separate" method="post" enctype="multipart/form-data">
            <input type="file" name="video" accept="video/*" required>
            <button type="submit">Extract Audio</button>
        </form>
    </section>

    <section>
        <h2>2. Transcribe Audio</h2>
        <form id="transcribeForm" onsubmit="transcribe(event)">
            <input type="file" name="audio" accept="audio/*" required>
            <button type="submit">Transcribe</button>
        </form>
        <div id="transcriptionResult" class="result"></div>
    </section>

    <section>
        <h2>3. Merge Video & Audio</h2>
        <form action="/merge" method="post" enctype="multipart/form-data">
            <input type="file" name="video" accept="video/*" required><br>
            <input type="file" name="audio" accept="audio/*" required><br>
            <label>Volume multiplier (e.g., 1.0 = original, 2.0 = double):</label>
            <input type="number" name="volume" step="0.1" value="1.0" required><br>
            <button type="submit">Merge & Download</button>
        </form>
    </section>

    <script>
        async function transcribe(event) {
            event.preventDefault();
            const form = event.target;
            const formData = new FormData(form);
            const res = await fetch('/transcribe', { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('transcriptionResult').innerText = data.text || 'Error: ' + data.error;
        }
    </script>
</body>
</html>
